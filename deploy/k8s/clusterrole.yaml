apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-traffic-interceptor
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-traffic-interceptor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-traffic-interceptor
subjects:
  - kind: ServiceAccount
    name: ai-traffic-interceptor
    namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-traffic-interceptor
  namespace: kube-system
